version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydb
    ports:
        - "5432:5432"
  backend:
    build: ./backend
    ports:
       - "3000:3000"
    environment:
      DB_PASSWORD: admin123
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
    - "8080:80"
    depends_on:
    - backend


